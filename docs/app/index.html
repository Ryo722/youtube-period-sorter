<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#cc0000" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-128.png" sizes="128x128" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <title>YouTube 期間別人気動画ソーター</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif;
        background: Canvas;
        color: CanvasText;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      .center { text-align: center; padding: 24px; }
      a { color: #cc0000; }
    </style>
  </head>
  <body>
    <div class="center">
      <p>読み込み中…</p>
      <noscript>
        <p>JavaScript を有効にしてください。</p>
        <p><a href="popup/popup.html">こちらから続行</a></p>
      </noscript>
    </div>
    <script>
      // Web Share Target の query (?url=...&text=... 等) があれば、そのまま popup に転送する。
      // popup 側の lib/platform/tabs.js が url/text/title/channel を読んでチャンネルを推定する。
      (function () {
        var qs = location.search || "";
        location.replace("popup/popup.html" + qs);
      })();
    </script>
  </body>
</html>
